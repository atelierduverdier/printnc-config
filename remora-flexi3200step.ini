# =========================================================================
# GUIDE DE CONFIGURATION PRINTNC - FLEXI-HAL
# =========================================================================
# [DISPLAY] : 
# - DISPLAY : Interface QtDragon (HD pour les écrans modernes).
# - INCREMENTS : Les boutons de déplacement bougeront de 100mm à 0.01mm.
# - SPINDLE : Broche réglée entre 6000 et 24000 tr/min.
#
# [KINS] :
# - JOINTS = 4 : Moteurs physiques (0:X, 1:Y1, 2:Z, 3:Y2).
# - COORDINATES = XYZY : Définit que l'axe Y a deux moteurs (Tandem).
#
# [HOMING & LIMITS] :
# - SEQUENCE 0 (Z) : Monte en premier pour dégager l'outil (vitesse positive).
# - SEQUENCE 1 (Y) : Les deux moteurs Y cherchent le capteur (vitesse négative).
# - SEQUENCE 2 (X) : Le X se fait en dernier.
# - HOME_OFFSET = 0 : Le point de contact du capteur est défini comme le point 0.0.
# - HOME = 5.0 : Après le contact, la machine s'écarte de 5mm pour être prête.
# - MIN_LIMIT = -10.0 : Marge de sécurité pour éviter les erreurs de limite.
# =========================================================================



[EMC]
MACHINE = PrintNC Flexi-HAL 
DEBUG = 0
VERSION = 1.1

[DISPLAY]
DISPLAY = qtvcp -f qtdragon_hd
PROGRAM_PREFIX = ~/linuxcnc/nc_files
PREFERENCE_FILE_PATH = ~/linuxcnc/configs/flexi-hal/qtdragon.pref
NGCGUI_SUBFILE_PATH = ~/linuxcnc/ngcgui_lib
EDITOR = geany
POSITION_OFFSET = RELATIVE
POSITION_FEEDBACK = ACTUAL
ARCDIVISION = 64
GRIDS = 10mm 20mm 50mm 100mm
MAX_FEED_OVERRIDE = 2.0
MIN_SPINDLE_0_OVERRIDE = 0.5
MAX_SPINDLE_0_OVERRIDE = 2.0
DEFAULT_SPINDLE_0_SPEED = 6000
MIN_SPINDLE_0_SPEED = 6000
MAX_SPINDLE_0_SPEED = 24000
MAX_SPINDLE_POWER = 2400
DEFAULT_LINEAR_VELOCITY = 50.00
MIN_LINEAR_VELOCITY = 0
MAX_LINEAR_VELOCITY = 200
DEFAULT_ANGULAR_VELOCITY = 36.00
MIN_ANGULAR_VELOCITY = 0
MAX_ANGULAR_VELOCITY = 45.00
INTRO_GRAPHIC = /home/expatria/linuxcnc/configs/flexi-hal/PrintNC.png
INTRO_TIME = 5
INCREMENTS = 100mm 10mm 1mm 0.1mm .01mm
#Pre selected NGCGUI programs tabs, specify filenames only, files must be in the NGCGUI_SUBFILE_PATH
NGCGUI_SUBFILE = slot.ngc
NGCGUI_SUBFILE = qpocket.ngc
OPENGL_CHECK_LEVEL = 2
CANVAS_VCP_LWIDTH = 3

[PROBE]
USE_PROBE = versaprobe
#USE_PROBE = basicprobe

[MDI_COMMAND_LIST]
# Macro buttons, up to 10 available. 
MDI_COMMAND = G0 Z25;X0 Y0;Z0, Goto\nUser\nZero
MDI_COMMAND = G53 G0 Z0;G53 G0 X0 Y0,Goto\nMachn\nZero

[KINS]
JOINTS = 4
KINEMATICS = trivkins coordinates=XYZY kinstype=BOTH

[FILTER]
PROGRAM_EXTENSION = .ngc,.nc,.tap G-Code file (*.ngc,*.nc,*.tap)
PROGRAM_EXTENSION = .py Python Script
py = python

[TASK]
TASK = milltask
CYCLE_TIME = 0.010

[RS274NGC]
PARAMETER_FILE = linuxcnc.var
RS274NGC_STARTUP_CODE = F10 G21 G17 G40 G49 G54 G64 P0.001 G80 G90 G91.1 G92.1 G94 G97 G98
FEATURES = 30
SUBROUTINE_PATH = ~/linuxcnc/configs/flexi-hal/subroutines:~/linuxcnc/ngcgui_lib:~/linuxcnc/ngcgui_lib/utilitysubs
# on abort, this ngc file is called. required for basic/versa probe routines.
ON_ABORT_COMMAND=O <on_abort> call



[EMCMOT]
EMCMOT = motmod
COMM_TIMEOUT = 1.0
COMM_WAIT = 0.010
BASE_PERIOD = 0
SERVO_PERIOD = 1000000
#SERVO_PERIOD = 500000

[HAL]
TWOPASS = on
HALFILE = remora-flexi.hal
POSTGUI_HALFILE = postgui_call_list.hal
HALUI = halui

[TRAJ]
COORDINATES =  XYZY
LINEAR_UNITS = mm
ANGULAR_UNITS = degree
CYCLE_TIME = 0.010
DEFAULT_LINEAR_VELOCITY = 50.00
#MAX_LINEAR_VELOCITY = 10000.00
MAX_LINEAR_VELOCITY = 200.00
NO_FORCE_HOMING = 1 
SPINDLES = 1

[EMCIO]
EMCIO = io
CYCLE_TIME = 0.100
TOOL_TABLE = tool.tbl

[AXIS_X]
MAX_VELOCITY = 200.0
MAX_ACCELERATION = 800.0
MIN_LIMIT = -5.0
MAX_LIMIT = 1285.0

[JOINT_0]
TYPE = LINEAR
HOME = 0.0
MIN_LIMIT = -5.0
MAX_LIMIT = 1285.0
#MAX_VELOCITY = 200.0
#MAX_ACCELERATION = 1000.0
STEPGEN_MAXACCEL = 1200.0
