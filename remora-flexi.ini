# =========================================================================
# GUIDE DE CONFIGURATION PRINTNC - FLEXI-HAL
# =========================================================================
# [DISPLAY] : 
# - DISPLAY : Interface QtDragon (HD pour les écrans modernes).
# - INCREMENTS : Les boutons de déplacement bougeront de 100mm à 0.01mm.
# - SPINDLE : Broche réglée entre 6000 et 24000 tr/min.
#
# [KINS] :
# - JOINTS = 4 : Moteurs physiques (0:X, 1:Y1, 2:Z, 3:Y2).
# - COORDINATES = XYZY : Définit que l'axe Y a deux moteurs (Tandem).
#
# [HOMING & LIMITS] :
# - SEQUENCE 0 (Z) : Monte en premier pour dégager l'outil (vitesse positive).
# - SEQUENCE 1 (Y) : Les deux moteurs Y avancent vers le fond (vitesse positive).
# - SEQUENCE 2 (X) : Le X se fait en dernier.
# - HOME_OFFSET = 0 : Le point de contact du capteur est défini comme le point 0.0.
# - HOME = 5.0 : Après le contact, la machine s'écarte de 5mm pour être prête.
# - MIN_LIMIT = -10.0 : Marge de sécurité pour éviter les erreurs de limite.
# =========================================================================
# =========================================================================
# CONFIGURATION LINUXCNC - PRINTNC (ATELIER DU VERDIER)
# Carte Contrôleur : Flexi-HAL (Firmware Remora)
# Dernière mise à jour : Mai 2026
# =========================================================================

[EMC]
# Nom de la machine affiché au démarrage
MACHINE = PrintNC Flexi-HAL 6000
# Mode débug (0 = désactivé, évite de polluer les logs)
DEBUG = 0
# Version interne de cette configuration
VERSION = 1.1

[DISPLAY]
# Utilise l'interface QtDragon optimisée pour les écrans HD
DISPLAY = qtvcp -f qtdragon_hd
# Dossier par défaut où sont stockés tes fichiers de G-code (.ngc)
PROGRAM_PREFIX = ~/linuxcnc/nc_files
# Sauvegarde de la position des fenêtres et préférences
PREFERENCE_FILE_PATH = ~/linuxcnc/configs/flexi-hal/qtdragon.pref
# Dossier pour les sous-programmes et assistants géométriques
NGCGUI_SUBFILE_PATH = ~/linuxcnc/ngcgui_lib
# Éditeur de texte qui s'ouvre pour modifier le G-code à la volée
EDITOR = geany

# Affiche les coordonnées par rapport à ton Zéro pièce (G54)
POSITION_OFFSET = RELATIVE
# Affiche la position réelle calculée par LinuxCNC
POSITION_FEEDBACK = ACTUAL
# Précision graphique de l'affichage des cercles/arcs à l'écran
ARCDIVISION = 64
# Tailles de la grille d'arrière-plan sélectionnables
GRIDS = 10mm 20mm 50mm 100mm

# Permet de pousser la vitesse d'avance jusqu'à 200% pendant l'usinage (Override)
MAX_FEED_OVERRIDE = 2.0
# Permet de baisser la vitesse de la broche jusqu'à 50%
MIN_SPINDLE_0_OVERRIDE = 0.5
# Permet de surcadencer la broche jusqu'à 200%
MAX_SPINDLE_0_OVERRIDE = 2.0

# Vitesse de rotation par défaut au démarrage (tr/min)
DEFAULT_SPINDLE_0_SPEED = 6000
# Vitesse minimale absolue envoyée au variateur (VFD)
MIN_SPINDLE_0_SPEED = 100
# Vitesse maximale absolue de ta broche (tr/min)
MAX_SPINDLE_0_SPEED = 24000
# Puissance théorique max de la broche (en Watts)
MAX_SPINDLE_POWER = 2400

# Vitesse de déplacement manuel par défaut (50 mm/s soit 3000 mm/min)
DEFAULT_LINEAR_VELOCITY = 50.00
# Vitesse manuelle minimale
MIN_LINEAR_VELOCITY = 0
# Vitesse manuelle maximale autorisée au curseur (250 mm/s soit 15000 mm/min)
MAX_LINEAR_VELOCITY = 250
# Vitesse par défaut pour les axes rotatifs
DEFAULT_ANGULAR_VELOCITY = 36.00
# Vitesse minimale pour les axes rotatifs
MIN_ANGULAR_VELOCITY = 0
# Vitesse maximale pour les axes rotatifs
MAX_ANGULAR_VELOCITY = 45.00

# Image au chargement (Écran d'accueil)
INTRO_GRAPHIC = /home/expatria/linuxcnc/configs/flexi-hal/PrintNC.png
# Temps d'affichage de l'image (5 secondes)
INTRO_TIME = 5
# Valeurs des pas de déplacement en mode manuel (Jog)
INCREMENTS = 100mm 10mm 1mm 0.1mm .01mm

# Assistant pour usiner des rainures débouchantes
NGCGUI_SUBFILE = slot.ngc
# Assistant pour usiner des poches rectangulaires ou carrées
NGCGUI_SUBFILE = qpocket.ngc
# Niveau de vérification de la carte graphique pour le rendu 3D
OPENGL_CHECK_LEVEL = 2
# Épaisseur des lignes de trajectoire à l'écran
CANVAS_VCP_LWIDTH = 3

[SPINDLE_0]
MIN_FORWARD_VELOCITY = 100
MAX_FORWARD_VELOCITY = 24000
# Les boutons + et - de l'interface modifient la vitesse par pas de 100 tr/min
INCREMENT = 100

[PROBE]
# Active l'interface de palpage de précision VersaProbe (pour ton Tool Setter)
USE_PROBE = versaprobe

[MDI_COMMAND_LIST]
# Bouton pour aller au point Zéro de ta pièce en sécurité (Z d'abord, puis X et Y)
MDI_COMMAND = G0 Z25;X0 Y0;Z0, Goto\nUser\nZero
# Bouton pour retourner à l'origine absolue de la machine (Home machine)
MDI_COMMAND = G53 G0 Z0;G53 G0 X0 Y0,Goto\nMachn\nZero

[KINS]
# Nombre total de moteurs physiques à gérer (X, Y1, Z, Y2)
JOINTS = 4
# Lie les moteurs aux axes : le 4ème moteur suit l'axe Y (Tandem)
KINEMATICS = trivkins coordinates=XYZY kinstype=BOTH

[FILTER]
# Extensions de fichiers de code G acceptées
PROGRAM_EXTENSION = .ngc,.nc,.tap G-Code file (*.ngc,*.nc,*.tap)
# Association pour l'exécution de scripts Python
PROGRAM_EXTENSION = .py Python Script
py = python

[TASK]
# Module de tâche principal pour les fraiseuses 3 axes
TASK = milltask
# Fréquence d'exécution des tâches de LinuxCNC (10 ms)
CYCLE_TIME = 0.010

[RS274NGC]
# Fichier qui retient tes variables (comme la position de tes zéros enregistrés)
PARAMETER_FILE = linuxcnc.var
# Code de sécurité exécuté à l'ouverture (Définit les mm, plan XY, annule les correcteurs et applique le lissage G64 P0.001)
RS274NGC_STARTUP_CODE = F10 G21 G17 G40 G49 G54 G64 P0.001 G80 G90 G91.1 G92.1 G94 G97 G98
# Options avancées activées pour l'interpréteur de code G
FEATURES = 30
# Chemins d'accès pour les sous-programmes et macros de changement d'outil
SUBROUTINE_PATH = ~/linuxcnc/configs/flexi-hal/subroutines:~/linuxcnc/ngcgui_lib:~/linuxcnc/ngcgui_lib/utilitysubs
# Routine de sécurité appelée si tu presses la touche Arrêt d'urgence (Reset des palpeurs)
ON_ABORT_COMMAND=O <on_abort> call

[EMCMOT]
# Module temps réel de gestion des mouvements
EMCMOT = motmod
# Temps mort max de communication en secondes
COMM_TIMEOUT = 1.0
# Temps d'attente réseau en secondes
COMM_WAIT = 0.010
# Période de base (0 car la carte Flexi-HAL gère elle-même la génération de pas)
BASE_PERIOD = 0
# Fréquence de la boucle d'asservissement : 1 000 000 ns = 1 kHz (1000 rafraîchissements par seconde)
SERVO_PERIOD = 1000000

[HAL]
# Permet de charger les composants HAL en deux passes pour optimiser les liaisons complexes
TWOPASS = on
# Le fichier principal qui câble virtuellement LinuxCNC vers la Flexi-HAL
HALFILE = remora-flexi.hal
# Fichier HAL chargé après l'interface graphique (liaison des boutons de l'écran)
POSTGUI_HALFILE = postgui_call_list.hal
# Active les commandes utilisateur de l'interface HAL
HALUI = halui

[TRAJ]
# Configuration des axes physiques
COORDINATES = XYZY
# Unité de mesure par défaut de la structure
LINEAR_UNITS = mm
# Unité pour les angles
ANGULAR_UNITS = degree
# Temps de cycle des trajectoires
CYCLE_TIME = 0.010
# Vitesse de croisière automatique par défaut
DEFAULT_LINEAR_VELOCITY = 50.00
# Plafond de vitesse absolue de la machine (250 mm/s = 15 000 mm/min)
MAX_LINEAR_VELOCITY = 250
# Autorise le mouvement manuel sans avoir fait la prise d'origine préalable
NO_FORCE_HOMING = 1
# Nombre de broches pilotées
SPINDLES = 1

[EMCIO]
# Module de gestion des entrées/sorties (Lubrification, Brumes, etc.)
EMCIO = io
# Temps de scrutation des entrées/sorties (100 ms)
CYCLE_TIME = 0.100
# Nom du fichier qui contient ton tableau de correcteurs d'outils
TOOL_TABLE = tool.tbl


# =========================================================================
# AXE X (Chariot transversal qui porte la broche)
# =========================================================================
[AXIS_X]
# Vitesse max de l'axe X (250 mm/s = 15 000 mm/min)
MAX_VELOCITY = 250
# Accélération max de l'axe X (500 mm/s²). Réglage doux pour l'établi.
MAX_ACCELERATION = 250.0
# Limite logicielle basse
MIN_LIMIT = -5.0
# Limite logicielle haute (Course max de ton axe X)
MAX_LIMIT = 1285.0

[JOINT_0]
# Type d'axe linéaire
TYPE = LINEAR
# Position où se positionne l'axe après sa prise d'origine (Home) - Écart de 5mm pour libérer le capteur
HOME = 5.0
# Limite basse moteur
MIN_LIMIT = -5.0
# Limite haute moteur
MAX_LIMIT = 1285.0
# Accélération maximale du générateur de pas matériel (Flexi-HAL)
STEPGEN_MAXACCEL = 350.0
# Vitesse maximale du générateur de pas électrique
STEPGEN_MAXVEL = 280
# Échelle (Pas par tour du driver 1600 / Pas de la vis SFU1610 de 10mm = 160. Le moins inverse le sens)
SCALE = -160.0
# Durée de l'impulsion de pas (2500 ns - Harmonisé)
STEPLEN = 2500
# Temps de repos minimal entre deux impulsions (2500 ns - Harmonisé)
STEPSPACE = 2500
# Temps de présence du signal de direction avant l'impulsion (4000 ns)
DIRSETUP = 4000
# Temps de maintien du signal de direction après l'impulsion (4000 ns)
DIRHOLD = 4000
# Vitesse max du moteur (15 000 mm/min)
MAX_VELOCITY = 250
# Accélération moteur lissée pour la structure
MAX_ACCELERATION = 250.0
# Gain Proportionnel du PID
P_GAIN = 50
# Gain Anticipation (Feed-Forward)
FF1_GAIN = 1
# Zone morte en mm (5 microns)
DEADBAND = 0.005
# Erreur de suivi maximale tolérée à haute vitesse en mm
FERROR = 5
# Erreur de suivi minimale tolérée à l'arrêt en mm
MIN_FERROR = 0.5
# Décalage d'origine appliqué après détection
HOME_OFFSET = 0
# Vitesse de recherche initiale du capteur (négative = part à gauche)
HOME_SEARCH_VEL = -20
# Vitesse lente de précision pour valider le contact en marche arrière
HOME_LATCH_VEL = 2
# Vitesse pour aller se ranger à la position finale HOME
HOME_FINAL_VEL = 5
# Utilisation du top zéro de l'encodeur (Non pour capteur classique)
HOME_USE_INDEX = NO
# Séquence de Homing : l'axe X se déplace en dernier (après Z et Y)
HOME_SEQUENCE = 2


# =========================================================================
# AXE Y (Premier moteur du grand portique longitudinal)
# =========================================================================
[AXIS_Y]
# Vitesse max globale de l'axe Y (250 mm/s = 15 000 mm/min)
MAX_VELOCITY = 250
# Accélération lissée pour empêcher l'établi de trembler
MAX_ACCELERATION = 250.0
# Limite de sécurité basse
MIN_LIMIT = -2.0
# Limite haute de ta grande longueur de PrintNC
MAX_LIMIT = 1286.00

[JOINT_1]
TYPE = LINEAR
# Position de repli finale après homing
HOME = 1275
MIN_LIMIT = -2.0
MAX_LIMIT = 1286.00
STEPGEN_MAXACCEL = 350.0
# Vitesse maximale du générateur de pas électrique
STEPGEN_MAXVEL = 280
# Configuration pour 1600 pas (driver) avec vis SFU1610 au pas de 10mm (1600/10 = 160)
SCALE = 160.0
# Timings électriques optimisés (2500 ns) pour assurer une excellente stabilité avec la Flexi-HAL
STEPLEN = 2500
STEPSPACE = 2500
DIRSETUP = 4000
DIRHOLD = 4000
MAX_VELOCITY = 250
MAX_ACCELERATION = 250.0
P_GAIN = 50
FF1_GAIN = 1
DEADBAND = 0.005
FERROR = 5
MIN_FERROR = 0.5
# Coordonnée mécanique du capteur de fin de course Y
HOME_OFFSET = 1285
# Vitesse positive (il avance vers le fond pour chercher le capteur)
HOME_SEARCH_VEL = 20
# Recul très lent pour affiner la détection
HOME_LATCH_VEL = 1
HOME_FINAL_VEL = 5
HOME_USE_INDEX = NO
# Séquence 1 : Le portique Y fait son homing en deuxième position (après le Z)
HOME_SEQUENCE = 1


# =========================================================================
# AXE A (Deuxième moteur de l'axe Y, monté en esclave/tandem - JOINT_3)
# =========================================================================
[JOINT_3]
TYPE = LINEAR
# Position de repli finale après homing (identique au JOINT_1)
HOME = 1275
MIN_LIMIT = -2.0
MAX_LIMIT = 1286.00
STEPGEN_MAXACCEL = 350.0
# Vitesse maximale du générateur de pas électrique
STEPGEN_MAXVEL = 280
# Moins (-) indispensable car le moteur est monté face à l'autre (effet miroir), base 1600 pas / vis de 10
SCALE = -160.0
STEPLEN = 2500
STEPSPACE = 2500
DIRSETUP = 4000
DIRHOLD = 4000
MAX_VELOCITY = 250
MAX_ACCELERATION = 250.0
P_GAIN = 50
FF1_GAIN = 1
DEADBAND = 0.005
FERROR = 5
MIN_FERROR = 0.5
HOME_OFFSET = 1285
# Même vitesse et même direction que le JOINT_1
HOME_SEARCH_VEL = 20
# Recul très lent pour affiner la détection
HOME_LATCH_VEL = 1
HOME_FINAL_VEL = 5
HOME_USE_INDEX = NO
# Même séquence de homing que le JOINT_1 pour une synchronisation parfaite
HOME_SEQUENCE = 1


# =========================================================================
# AXE Z (Axe vertical de montée/descente de la broche)
# =========================================================================
[AXIS_Z]
# Vitesse max réduite pour le Z (33.33 mm/s = 2 000 mm/min) face à la gravité
MAX_VELOCITY = 33.33
# Accélération du Z (400 mm/s²)
MAX_ACCELERATION = 250.0
# Course maximale vers le bas (185 mm de descente)
MIN_LIMIT = -185
# Limite de remontée maximale
MAX_LIMIT = 5

[JOINT_2]
TYPE = LINEAR
# Après homing, il s'établit au point le plus haut pour la sécurité de l'outil
HOME = 0.0
MIN_LIMIT = -185
MAX_LIMIT = 5
MAX_VELOCITY = 33.33
MAX_ACCELERATION = 250.0
STEPGEN_MAXACCEL = 350.0
STEPGEN_MAXVEL = 100.0
# Gain plus doux sur le Z pour éviter les résonances verticales
P_GAIN = 10
FF1_GAIN = 1.0
# Configuration pour driver à 1600 pas et vis SFU1204 fine au pas de 4mm (1600/4 = 400)
SCALE = 400
DEADBAND = 0.005
FERROR = 5
MIN_FERROR = 0.5
HOME_OFFSET = 1.0
# Vitesse positive : l'axe Z MONTE pour chercher son capteur (sécurité outil !)
HOME_SEARCH_VEL = 10
# Recul vers le bas pour affiner la mesure
HOME_LATCH_VEL = -2.0
# CORRIGÉ : La vitesse finale doit obligatoirement être positive. LinuxCNC gère le sens de déplacement vers la cible de HOME.
HOME_FINAL_VEL = 5.0
HOME_USE_INDEX = NO
# Séquence 0 : L'AXE Z MONTE EN PREMIER, impératif avant X et Y !
HOME_SEQUENCE = 0
STEPLEN = 2500
STEPSPACE = 2500
DIRSETUP = 4000
DIRHOLD = 4000
