# =========================================================================
# CHARGEMENT DES COMPOSANTS TEMPS RÉEL (REALTIME)
# =========================================================================

# load the realtime components
# (Commentaire d'origine) Section dédiée au chargement des modules synchronisés avec l'horloge système

    loadrt [KINS]KINEMATICS
    # Charge le module de cinématique (trivkins) configuré dans ton fichier .ini (XYZY tandem)

    loadrt [EMCMOT]EMCMOT base_period_nsec=[EMCMOT]BASE_PERIOD servo_period_nsec=[EMCMOT]SERVO_PERIOD num_joints=[KINS]JOINTS
    # Initialise le contrôleur de mouvements natif de LinuxCNC avec tes périodes d'asservissement (1 kHz)

    loadrt flexi PRU_base_freq=120000
    # Charge le pilote de la carte Flexi-HAL (Remora) avec une fréquence de rafraîchissement interne de 120 kHz

    loadrt not names=stepen_not,stepen_z_not
    # Instancie deux portes logiques de type "NON" (inverseurs) pour gérer l'activation des drivers de moteurs

    loadrt estop_latch names=estop_latch
    # Charge un composant de verrouillage d'arrêt d'urgence pour sécuriser la machine en cas de panne

    loadrt and2 names=run_and,step_and
    # Charge deux portes logiques "ET" à 2 entrées pour conditionner les boutons physiques du pupitre

    loadrt toggle names=hold_button_toggle
    # Charge un composant de bascule (bouton poussoir -> interrupteur On/Off) pour gérer les pauses

    loadrt toggle2nist names=hold_toggle,paused_toggle
    # Charge deux modules de conversion d'états pour synchroniser des commutateurs avec les commandes LinuxCNC


# =========================================================================
# ACCROCHAGE DES FONCTIONS AUX THREADS (SERVO-THREAD)
# =========================================================================

# add the remora and motion functions to threads
# (Commentaire d'origine) Allocation des tâches au cycle temps réel pour exécution périodique

    addf flexi.read servo-thread
    # Ajoute la lecture des entrées physiques de la Flexi-HAL au début du cycle temps réel

    addf motion-command-handler servo-thread
    # Ajoute le traitement des commandes de trajectoires G-code au cycle temps réel

    addf motion-controller servo-thread
    # Ajoute le calcul de la boucle d'asservissement des moteurs au cycle temps réel

    addf flexi.update-freq servo-thread
    # Met à jour la fréquence de génération d'impulsions de la carte à chaque cycle

    addf flexi.write servo-thread
    # Envoie les ordres physiques et impulsions de pas à la Flexi-HAL en fin de cycle

    addf stepen_not servo-thread
    # Exécute l'inversion logique de l'activation des moteurs X/Y dans la boucle

    addf stepen_z_not servo-thread
    # Exécute l'inversion logique de l'activation du moteur Z dans la boucle

    addf estop_latch servo-thread
    # Traite l'état de la boucle d'arrêt d'urgence à chaque milliseconde

    addf run_and servo-thread
    # Calcule l'état de la porte "ET" dédiée au lancement du programme (Cycle Start)

    addf step_and servo-thread
    # Calcule l'état de la porte "ET" dédiée à l'avance pas à pas (Single Step)

    addf hold_toggle servo-thread
    # Évalue l'état du commutateur logiciel de mise en pause dans le fil d'exécution

    addf hold_button_toggle servo-thread
    # Évalue l'appui physique sur le bouton de pause à chaque cycle


# =========================================================================
# SYNCHRONISATION DES ÉTATS ET SIGNAUX LOGIQUES
# =========================================================================

#toggle2nist states & mux selectors
# (Commentaire d'origine) Gestion des signaux de bascule et des sélections d'états de l'interface

    net program-is-paused hold_toggle.is-on <= halui.program.is-paused
    # Connecte l'état "en pause" de LinuxCNC à l'entrée de synchronisation de ton bouton poussoir


# =========================================================================
# PILOTAGE DE LA BROCHE PAR DRIVER HY_VFD (CONSERVÉ)
# =========================================================================

# hy_vfd - uncomment the below if using hy_vfd. Use ttyAMA3 for Pi 4 and ttyAMA2 for Pi 5
# (Commentaire d'origine) Configuration d'origine validée et fonctionnelle pour ton variateur Huanyang

    loadusr -Wn vfd hy_vfd -n vfd -d /dev/ttyAMA2 -p none -r 9600 -s 1
    # Lance le driver hy_vfd en mode utilisateur, connecté sur le port ttyAMA2 à 9600 bauds sans parité

    loadrt scale names=spindle_fb_scale
    # Charge un module de mise à l'échelle pour adapter la vitesse de retour de la broche

    addf spindle_fb_scale servo-thread
    # Assigne le calcul de l'échelle de vitesse au thread temps réel (servo-thread)

    setp spindle_fb_scale.gain 0.016666667
    # Fixe le gain à 1/60 pour convertir la vitesse lue en tours/min vers des tours/seconde

    setp vfd.enable 1
    # Active en permanence le bloc de communication Modbus vers ton variateur Huanyang

    net spindle-speed-cmd vfd.speed-command <= spindle.0.speed-out
    # Envoie la consigne de vitesse calculée par LinuxCNC vers le registre de commande du VFD

    net spindle-fb-scale-in vfd.spindle-speed-fb => spindle_fb_scale.in
    # Dirige la vitesse brute lue sur le variateur vers le module de conversion d'échelle

    net spindle-speed-fb spindle_fb_scale.out => spindle.0.speed-in
    # Renvoie la vitesse lue et convertie vers LinuxCNC pour l'affichage à l'écran

    net spindle-at-speed vfd.spindle-at-speed => spindle.0.at-speed
    # Transmet le signal de stabilisation du variateur ("Vitesse atteinte") à LinuxCNC pour autoriser l'usinage

    net spindle-forward vfd.spindle-forward => spindle.0.forward
    # Relie la commande de sens de rotation horaire (M3) au variateur

    net spindle-reverse vfd.spindle-reverse => spindle.0.reverse
    # Relie la commande de sens de rotation antihoraire (M4) au variateur

    net spindle-on vfd.spindle-on => spindle.0.on
    # Connecte le signal de mise en marche général (M3/M4) à l'ordre d'allumage du VFD

    net spindle-comm-ok <= vfd.hycomthread
    # Associe le signal de contrôle de communication propre au composant hy_vfd


# =========================================================================
# SÉCURITÉS, ARRÊT D'URGENCE (ESTOP) ET LIAISON SPI
# =========================================================================

# estop loopback, SPI comms enable and feedback
# (Commentaire d'origine) Gestion de la boucle de sécurité matérielle et de la communication SPI entre Pi et Flexi

    net user-enable-out iocontrol.0.user-enable-out => flexi.SPI-enable
    # Transmet l'ordre d'activation de l'interface LinuxCNC pour autoriser le démarrage de la liaison SPI

    net user-request-enable iocontrol.0.user-request-enable => flexi.SPI-reset estop_latch.reset
    # Relie le bouton de réinitialisation de l'interface (F2) pour armer le verrou SPI et le loquet d'E-stop

    #estop_latch returns 'ok' when fault-in is false, ok-in is true, and reset changes from false to true. 
    # (Commentaire d'origine) Logique du loquet d'E-stop : nécessite l'absence de défaut, le SPI OK, et une impulsion de Reset

    net estop-fault_in flexi.input.HALT.not => estop_latch.fault-in
    # Envoie le signal inversé de la pin d'arrêt HALT (alarmes drivers/bouton coup de poing) vers le loquet d'erreur

    net remora-status flexi.SPI-status => estop_latch.ok-in
    # Connecte l'état de santé de la liaison SPI (Remora) comme condition "OK" d'entrée du loquet

    net estop-status estop_latch.ok-out => iocontrol.0.emc-enable-in
    # Renvoie le signal de sortie du loquet pour valider ou couper l'alimentation logicielle globale de LinuxCNC


# =========================================================================
# CONFIGURATION DE L'AXE X (JOINT 0)
# =========================================================================

# Joint 0 setup
# (Commentaire d'origine) Configuration des paramètres et signaux du moteur du chariot X

    setp flexi.joint.0.scale [JOINT_0]SCALE
    # Applique la valeur d'échelle (pas/mm) définie dans le fichier .ini pour le moteur X

    setp flexi.joint.0.maxaccel [JOINT_0]STEPGEN_MAXACCEL
    # Configure la limite d'accélération électrique du générateur de pas de la Flexi pour X

    setp flexi.joint.0.pgain [JOINT_0]P_GAIN
    # Règle le gain proportionnel de la boucle de correction de position du moteur X

    setp flexi.joint.0.ff1gain [JOINT_0]FF1_GAIN
    # Règle le gain d'anticipation (Feed-Forward) pour dynamiser le suivi du moteur X

    setp flexi.joint.0.deadband [JOINT_0]DEADBAND
    # Définit la zone morte en mm sous laquelle le correcteur de position X n'intervient pas

    net xpos-cmd joint.0.motor-pos-cmd => flexi.joint.0.pos-cmd
    # Connecte la trajectoire théorique calculée par LinuxCNC à la commande de position de la Flexi

    net j0pos-fb flexi.joint.0.pos-fb => joint.0.motor-pos-fb
    # Renvoie la position réelle mesurée par la carte vers le moteur de calcul de LinuxCNC

    net j0enable joint.0.amp-enable-out => flexi.joint.0.enable
    # Active le calcul interne des pas de l'axe X lorsque LinuxCNC active le moteur

    net x-home joint.0.home-sw-in => flexi.input.X_LIMIT.not
    # Relie le capteur de fin de course X inversé (normalement fermé sécurisé) à la logique de prise d'origine


# =========================================================================
# CONFIGURATION DE L'AXE Y1 (JOINT 1)
# =========================================================================

# Joint 1 setup
# (Commentaire d'origine) Configuration du premier moteur de ton grand portique (Maître)

    setp flexi.joint.1.scale [JOINT_1]SCALE
    # Assigne la valeur d'échelle de pas pour le moteur Y1

    setp flexi.joint.1.maxaccel [JOINT_1]STEPGEN_MAXACCEL
    # Configure la limite d'accélération électrique du générateur de pas pour Y1

    setp flexi.joint.1.pgain [JOINT_1]P_GAIN
    # Définit la correction proportionnelle du PID pour l'axe Y1

    setp flexi.joint.1.ff1gain [JOINT_1]FF1_GAIN
    # Définit l'anticipation cinématique pour l'axe Y1

    setp flexi.joint.1.deadband [JOINT_1]DEADBAND
    # Applique la tolérance de zone morte de positionnement pour Y1

    net j1pos-cmd joint.1.motor-pos-cmd => flexi.joint.1.pos-cmd
    # Injecte la consigne de déplacement de LinuxCNC dans le générateur de pas Y1 de la carte

    net j1pos-fb flexi.joint.1.pos-fb => joint.1.motor-pos-fb
    # Récupère le retour de position physique de Y1 pour l'asservissement général

    net j1enable joint.1.amp-enable-out => flexi.joint.1.enable
    # Active la fonction de calcul des pas pour le moteur Y1 lorsque l'axe est sollicité

    net y-home joint.1.home-sw-in => flexi.input.Y_LIMIT.not
    # Relie le capteur d'origine du côté gauche du portique à la détection de Homing du Joint 1


# =========================================================================
# CONFIGURATION DE L'AXE Z (JOINT 2)
# =========================================================================

# Joint 2 setup
# (REPARÉ) Configuration propre et corrigée du moteur de l'axe vertical (Broche)

    setp flexi.joint.2.scale [JOINT_2]SCALE
    # Assigne le ratio de pas pour la vis de l'axe vertical Z

    setp flexi.joint.2.maxaccel [JOINT_2]STEPGEN_MAXACCEL
    # Configure l'accélération électrique maximale autorisée sur le Z

    setp flexi.joint.2.pgain [JOINT_2]P_GAIN
    # Règle le gain proportionnel du PID pour l'axe Z

    setp flexi.joint.2.ff1gain [JOINT_2]FF1_GAIN
    # Applique le gain d'anticipation pour le suivi de la trajectoire verticale

    setp flexi.joint.2.deadband [JOINT_2]DEADBAND
    # Déclare la zone morte en millimètres pour l'immobilité du Z

    net j2pos-cmd joint.2.motor-pos-cmd => flexi.joint.2.pos-cmd
    # Transmet l'ordre de hauteur calculé par LinuxCNC à la commande de position de la Flexi

    net j2pos-fb flexi.joint.2.pos-fb => joint.2.motor-pos-fb
    # Renvoie la position calculée de l'outil vers le moteur de coordonnées de LinuxCNC

    net j2enable joint.2.amp-enable-out => flexi.joint.2.enable
    # Active le calcul interne des pas du Z lorsque LinuxCNC l'ordonne

    net z-home joint.2.home-sw-in => flexi.input.Z_LIMIT.not
    # Associe le capteur de contact haut du Z à la détection de Homing du Joint 2


# =========================================================================
# CONFIGURATION DE L'AXE Y2 (JOINT 3 - ESCLAVE DU PORTIQUE)
# =========================================================================

# Joint 3 setup
# (Commentaire d'origine) Configuration du second moteur du grand portique (Montage en tandem)

    setp flexi.joint.3.scale [JOINT_3]SCALE
    # Règle l'échelle de pas du deuxième moteur Y (Esclave)

    setp flexi.joint.3.maxaccel [JOINT_3]STEPGEN_MAXACCEL
    # Aligne l'accélération électrique de ce moteur sur celle du maître (Y1)

    setp flexi.joint.3.pgain [JOINT_3]P_GAIN
    # Aligne le gain proportionnel du PID pour équilibrer la poussée du portique

    setp flexi.joint.3.ff1gain [JOINT_3]FF1_GAIN
    # Aligne la valeur d'anticipation de trajectoire pour éviter la torsion mécanique

    setp flexi.joint.3.deadband [JOINT_3]DEADBAND
    # Fixe une zone morte identique pour assurer la synchronisation parfaite à l'arrêt

    net j3pos-cmd joint.3.motor-pos-cmd => flexi.joint.3.pos-cmd
    # Envoie la même consigne de déplacement mécanique au moteur esclave Y2

    net j3pos-fb flexi.joint.3.pos-fb => joint.3.motor-pos-fb
    # Renvoie le suivi de position du moteur droit pour la vérification du parallélisme

    net j3enable joint.3.amp-enable-out => flexi.joint.3.enable
    # Active la génération des impulsions de pas pour le moteur Y2 en même temps que le système

    net A-home joint.3.home-sw-in => flexi.input.A_LIMIT.not
    # Relie le capteur d'origine droit pour permettre le dégauchissage automatique du portique


# =========================================================================
# LOGIQUE DES SORTIES PHYSIQUES D'ACTIVATION DES DRIVERS (ENABLES)
# =========================================================================

# Motor enables
# (Commentaire d'origine) Connexion directe des signaux d'activation vers les broches matérielles de la Flexi

    net j0enable => flexi.output.STEP_EN
    # Envoie le signal d'armement X/Y à la pin physique de sortie STEP_EN de ta carte (Bloque/Libère les moteurs X/Y)

    net j2enable => flexi.output.STEP_EN_Z
    # Envoie le signal d'armement de l'axe vertical à la pin de sortie physique STEP_EN_Z (Bloque/Libère le Z)


# =========================================================================
# PILOTAGE DES SORTIES AUXILIAIRES : ARROSAGE ET ASPIRATION
# =========================================================================

# Flood and mist outputs
# (Commentaire d'origine) Câblage des commandes G-code d'arrosage (M7/M8) vers les relais de puissance

    net flood flexi.output.COOLANT <= iocontrol.0.coolant-flood
    # Assigne l'ordre d'arrosage général (M8) à la sortie physique COOLANT de la carte

    net mist flexi.output.MIST <= iocontrol.0.coolant-mist
    # Assigne l'ordre de brumisation (M7) à la sortie physique MIST de la carte


# =========================================================================
# BOUTONS PHYSIQUES DU PUPITRE : LOGIQUE DE PAUSE (FEED HOLD)
# =========================================================================

# User buttons
# (Commentaire d'origine) Traitement logique de l'appui sur le bouton poussoir de mise en pause

    net hold_button flexi.input.FEED_HOLD => hold_button_toggle.in
    # Envoie l'état du bouton poussoir physique FEED_HOLD vers le convertisseur d'impulsion On/Off

    net hold_toggle_latch hold_button_toggle.out => hold_toggle.in
    # Envoie la bascule d'état résultante vers l'interrupteur logiciel d'état stable

    net hold_on halui.program.pause <= hold_toggle.on
    # Active la commande de mise en pause immédiate de l'exécution G-code si le commutateur passe à "Vrai"

    net hold_off halui.program.resume <= hold_toggle.off
    # Relance l'exécution du travail à sa vitesse programmée lorsque le commutateur repasse à "Faux"


# =========================================================================
# LOGIQUE DU BOUTON DE LANCEMENT DE PROGRAMME (CYCLE START)
# =========================================================================

# Cycle start logic. When not running, start the program. When in feed hold, single step through the program.
# (Commentaire d'origine) Gestion à double fonction du bouton Cycle Start physique selon l'état de la machine

    net run-step_button flexi.input.CYCLE_START.not => run_and.in0 step_and.in0
    # Envoie l'état du poussoir physique CYCLE_START (inversé) vers les deux portes logiques de tri

    net program-is-idle halui.program.is-idle => run_and.in1
    # Valide la seconde entrée de la porte "ET" si la machine est au repos complet (Prête à démarrer)

    net program-run run_and.out => halui.program.run
    # Exécute l'ordre effectif de lancement du fichier G-code si les deux conditions de la porte sont réunies

    net program-is-paused => step_and.in1
    # Oriente le signal vers la seconde porte "ET" si le travail est actuellement gelé en cours de route

    net single-step step_and.out => halui.program.step
    # Déclenche l'exécution d'une seule ligne de code (mode pas-à-pas) lors d'un appui pendant une pause


# =========================================================================
# CONFIGURATION DU PALPEUR D'OUTIL (PROBE)
# =========================================================================

# Probe
# (Commentaire d'origine) Gestion du contacteur de mesure d'outil (Tool Setter)

    net probe_input motion.probe-input <= flexi.input.PROBE.not
    # Relie la pin d'entrée physique isolée de ton palpeur à la boucle d'acquisition rapide de LinuxCNC


# =========================================================================
# LOGIQUE DE CHANGEMENT D'OUTIL (TOOL CHANGE)
# =========================================================================

# Manual toolchange
# (Commentaire d'origine) Configuration dédiée à QtDragon HD : Le système valide directement la préparation en interne

    net tool-prepare-loopback iocontrol.0.tool-prepare => iocontrol.0.tool-prepared
    # Court-circuite la phase de pré-sélection d'outil en renvoyant directement l'acquittement de préparation
